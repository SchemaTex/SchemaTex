<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Schematex · Ladder Logic Preview</title>
<style>
  body { font-family: system-ui; background: #f5f5f5; margin: 0; padding: 20px; }
  nav { font-size: 13px; color: #888; margin-bottom: 16px; }
  nav a { color: #555; text-decoration: none; }
  nav a:hover { text-decoration: underline; }
  h1 { font-size: 18px; color: #333; margin: 0 0 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  h2 { font-size: 14px; color: #666; margin-top: 30px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
  pre.src { background: #f7f7f7; padding: 10px; font-size: 12px; border-radius: 6px; margin: 6px 0; border: 1px solid #eee; white-space: pre-wrap; }
  .svg-container { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 10px 0; overflow-x: auto; }
  .svg-container svg { display: block; max-width: 100%; height: auto; }
</style>
</head>
<body>
<nav><a href="index.html">← All Diagrams</a></nav>
<h1>Ladder Logic</h1>
<div class="subtitle">IEC 61131-3 / Allen-Bradley — contacts, coils, timers, counters, parallel branches</div>
<div id="output"></div>
<script type="module">
import { render } from '../src/index.ts';

const cases = [
  ['TC-LADD-01 · Single contact + coil', `ladder "Simple Output"

rung 1 "Turn on light":
  XIC(SWITCH)
  OTE(LIGHT)`],

  ['TC-LADD-02 · Series AND', `ladder "AND Logic"

rung 1 "All conditions":
  XIC(COND_A)
  XIC(COND_B)
  XIC(COND_C)
  OTE(OUTPUT)`],

  ['TC-LADD-03 · Parallel OR (Start/Stop seal)', `ladder "Motor Start/Stop"

rung 1 "Seal-in circuit":
  parallel:
    branch:
      XIC(START_PB)
    branch:
      XIC(MOTOR_AUX)
  XIO(STOP_PB)
  OTE(MOTOR_CMD)

rung 2 "Pilot light":
  XIC(MOTOR_CMD)
  OTE(PILOT_LIGHT)`],

  ['TC-LADD-04 · TON timer', `ladder "Delay Output"

rung 1 "Start delay":
  XIC(SENSOR_IN)
  TON(TIMER1, PT=5000)

rung 2 "Fire output after delay":
  XIC(TIMER1_DN)
  OTE(OUTPUT1)`],

  ['TC-LADD-05 · Set / Reset latch', `ladder "Latched Alarm"

rung 1 "Set alarm":
  XIC(FAULT_IN)
  OTL(ALARM)

rung 2 "Reset alarm":
  XIC(RESET_PB)
  OTU(ALARM)`],

  ['TC-LADD-06 · Counter', `ladder "Part Counter"

rung 1 "Count parts":
  XIC(PART_SENSOR)
  CTU(CTR1, PV=10)

rung 2 "Full signal":
  XIC(CTR1_DN)
  OTE(BIN_FULL)`],

  ['TC-LADD-07 · Compare instruction', `ladder "High Temp Alert"

rung 1 "Detect overtemp":
  GRT(CMP1, Source_A=TEMP_PV, Source_B=100)
  OTE(HIGH_TEMP)`],

  // ── Complex cases matching real-world references ───────────────
  ['Complex · Simple Logic Overview (ref image 1)', `ladder "Simple Logic"

rung 1 "Energize internal variable 1":
  XIC(INPUT_1, name="Input 1")
  XIC(INPUT_2, name="Input 2")
  OTE(INT_VAR_1, name="Internal Variable 1")

rung 2 "Produce Output 1":
  XIC(INT_VAR_1, name="Internal Variable 1")
  XIO(INPUT_3, name="Input 3")
  OTE(OUTPUT_1, name="Output 1")

rung 3 "Produce Output 2 (OR on inputs)":
  parallel:
    branch:
      XIC(INPUT_4, name="Input 4")
    branch:
      XIC(INPUT_5, name="Input 5")
  OTE(OUTPUT_2, name="Output 2")`],

  ['Complex · Mode Selection (ref image 2 — multi-coil SET/RST + seal-in)', `ladder "System Mode Selection"

rung 1 "Set system Auto mode, reset Manual":
  XIC(AUTO_HMIPB, "BIT 5.10", name="Auto Mode HMI Pushbutton")
  XIO(MANL_HMIPB, "BIT 5.11", name="Manual Mode HMI Pushbutton")
  XIO(SYS_FAULT, "BIT 3.0", name="System Fault")
  parallel:
    branch:
      OTL(SYS_AUTO, "BIT 3.1", name="System Auto Mode")
    branch:
      OTU(SYS_MANUAL, "BIT 3.2", name="System Manual Mode")

rung 2 "Set Manual, reset Auto (with Home seal-in)":
  parallel:
    branch:
      XIC(MANL_HMIPB, "BIT 5.11", name="Manual Mode HMI Pushbutton")
    branch:
      XIC(SYS_HOMECMD, "BIT 3.5", name="System Home Command")
  XIO(AUTO_HMIPB, "BIT 5.10", name="Auto Mode HMI Pushbutton")
  XIO(SYS_FAULT, "BIT 3.0", name="System Fault")
  XIO(SYS_AUTOCYCLE, "BIT 3.4", name="System Auto Cycling")
  parallel:
    branch:
      OTL(SYS_MANUAL, "BIT 3.2", name="System Manual Mode")
    branch:
      OTU(SYS_AUTO, "BIT 3.1", name="System Auto Mode")

rung 3 "Auto cycling seal-in":
  parallel:
    branch:
      XIC(CYC_START_PB, "IN 1.8", name="Cycle Start Pushbutton")
    branch:
      XIC(SYS_AUTOCYCLE, "BIT 3.4", name="System Auto Cycling")
  XIC(SYS_AUTO, "BIT 3.1", name="System Auto Mode")
  parallel:
    branch:
      XIO(CYC_STOP_PB, "IN 1.10", name="Cycle Stop Pushbutton")
    branch:
      XIC(AUTOSEQ_STEP0, "BIT 9.0", name="Auto Sequence Cycle Start Step 0")
  XIO(SYS_FAULT, "BIT 3.0", name="System Fault")
  OTE(SYS_AUTOCYCLE, "BIT 3.4", name="System Auto Cycling")`],

  ['Complex · Seal-in Relay Logic (ref image 3 — CR + Lamp + Motor)', `ladder "Seal-in Relays"

rung 1 "Seal-in CR1":
  parallel:
    branch:
      XIC(PB1)
    branch:
      XIC(CR1)
  OTE(CR1)

rung 2 "Seal-in CR2":
  parallel:
    branch:
      XIC(PB2)
    branch:
      XIC(CR2)
  OTE(CR2)

rung 3 "Latch CR3 on CR1 OR CR2":
  parallel:
    branch:
      XIC(CR1)
    branch:
      XIC(CR2)
  OTE(CR3)

rung 4 "Lamp L1 when CR3 off":
  XIO(CR3)
  OTE(L1)

rung 5 "Motor M1 when CR1 AND CR2":
  XIC(CR1)
  XIC(CR2)
  OTE(M1)`],

  ['Mixed features · XIO / ONS / addresses', `ladder "Mixed Rungs"

rung 1 "One-shot trigger":
  ONS(EDGE1)
  XIC(ENABLE, "I:0/1")
  OTE(TRIGGER, "O:0/2")

rung 2 "Normally-closed stop":
  XIC(RUN)
  XIO(EMERGENCY_STOP)
  OTE(RUNNING)`],
];

const out = document.getElementById('output');
for (const [title, src] of cases) {
  const h = document.createElement('h2'); h.textContent = title; out.appendChild(h);
  const pre = document.createElement('pre'); pre.className = 'src'; pre.textContent = src; out.appendChild(pre);
  const div = document.createElement('div'); div.className = 'svg-container';
  try {
    div.innerHTML = render(src);
  } catch (e) {
    div.innerHTML = '<code style="color:#c00">' + (e.message || e) + '</code>';
  }
  out.appendChild(div);
}
</script>
</body>
</html>
