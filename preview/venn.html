<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Schematex · Venn / Euler Preview</title>
<style>
  body { font-family: system-ui; background: #f5f5f5; margin: 0; padding: 20px; }
  nav { font-size: 13px; color: #888; margin-bottom: 16px; }
  nav a { color: #555; text-decoration: none; }
  h1 { font-size: 18px; color: #333; margin: 0 0 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  h2 { font-size: 14px; color: #666; margin-top: 30px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
  pre.src { background: #f7f7f7; padding: 10px; font-size: 12px; border-radius: 6px; margin: 6px 0; border: 1px solid #eee; white-space: pre-wrap; }
  .svg-container { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 10px 0; overflow-x: auto; }
  .svg-container svg { display: block; max-width: 100%; height: auto; }
</style>
</head>
<body>
<nav><a href="index.html">← All Diagrams</a></nav>
<h1>Venn / Euler Diagram</h1>
<div class="subtitle">Analytic n=2/3/4 · Euler containment · proportional areas</div>
<div id="output"></div>
<script type="module">
import { render } from '../src/index.ts';

const cases = [
  ['TC-VN-01 · n=2 basic', `venn "Basic 2-set"
set A "Developers"
set B "Designers"

A only : "Backend only"
B only : "UI / UX only"
A & B  : "Full-stack"
`],
  ['TC-VN-02 · n=3 programming paradigms', `venn "Programming paradigms"
set A "Object-oriented"
set B "Functional"
set C "Imperative"

A only      : "Java, Smalltalk"
B only      : "Haskell, Elm"
C only      : "Assembly"
A & B       : "Scala"
A & C       : "C++"
B & C       : "F#"
A & B & C   : "Python, JS, Rust"
`],
  ['TC-VN-03 · n=4 apps', `venn "Media apps"
set A "Video"
set B "Audio"
set C "Text"
set D "Images"

A only: "YouTube"
B only: "Spotify"
C only: "Medium"
D only: "Flickr"
A & B: "Podcasts"
A & C: "News videos"
B & C: "Audiobooks"
C & D: "Blogs"
A & B & C: "Streaming"
A & B & C & D: "Social feeds"
`],
  ['TC-VN-04 · Euler subset', `venn "Taxonomy"
set A "Mammals"
set B "Cats"

layout euler
B in A

A only: "Dogs, whales"
B only: "Lions, tigers"
`],
];

const out = document.getElementById('output');
for (const [title, src] of cases) {
  const section = document.createElement('div');
  section.innerHTML = `<h2>${title}</h2><pre class="src">${src.replace(/</g, '&lt;')}</pre><div class="svg-container"></div>`;
  out.appendChild(section);
  try {
    section.querySelector('.svg-container').innerHTML = render(src);
  } catch (e) {
    section.querySelector('.svg-container').innerHTML = `<pre style="color:red">${e.message}</pre>`;
  }
}
</script>
</body>
</html>
