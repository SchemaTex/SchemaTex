<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 480 320" width="480" height="320" class="schematex-venn" role="img"><title>Set operations: A ∪ B</title>
<desc>Venn/Euler diagram &quot;Set operations: A ∪ B&quot;: 2 sets, 3 regions.</desc>
<style>.schematex-venn { background: #ffffff; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
.schematex-venn-title { font: 600 16px sans-serif; fill: #2c3e50; }
.schematex-venn-set { stroke: #37474f; stroke-width: 1.25; }
.schematex-venn-blend-multiply { mix-blend-mode: multiply; }
.schematex-venn-blend-screen { mix-blend-mode: screen; }
.schematex-venn-setlabel { font: 600 13px sans-serif; fill: #2c3e50; }
.schematex-venn-label { font: 500 12px sans-serif; fill: #1f2937; dominant-baseline: central; text-anchor: middle; }
.schematex-venn-label-external { font: 500 11px sans-serif; fill: #1f2937; dominant-baseline: central; }
.schematex-venn-leader { stroke: #64748b; stroke-width: 0.7; fill: none; opacity: 0.8; }
.schematex-venn-leader-dot { fill: #64748b; }</style>
<text x="240" y="24" class="schematex-venn-title" text-anchor="middle">Set operations: A ∪ B</text>
<g class="schematex-venn-shapes schematex-venn-blend-multiply" style="mix-blend-mode: multiply"><g class="schematex-venn-set-group schematex-venn-set-group-0"><circle cx="180" cy="160" r="110" class="schematex-venn-set schematex-venn-set-0" fill="#4E79A7" fill-opacity="0.45" data-set-id="A"/>
<title>Set Even numbers ≤ 10</title></g>
<g class="schematex-venn-set-group schematex-venn-set-group-1"><circle cx="300" cy="160" r="110" class="schematex-venn-set schematex-venn-set-1" fill="#F28E2B" fill-opacity="0.45" data-set-id="B"/>
<title>Set Multiples of 3 ≤ 10</title></g></g>
<g class="schematex-venn-leaders"></g>
<g class="schematex-venn-setlabels"><text x="180" y="40" class="schematex-venn-setlabel" text-anchor="middle">Even numbers ≤ 10</text>
<text x="300" y="40" class="schematex-venn-setlabel" text-anchor="middle">Multiples of 3 ≤ 10</text></g>
<g class="schematex-venn-labels"><text x="149.82643397675554" y="160.2358170835793" class="schematex-venn-label" text-anchor="middle" data-region="A">2, 4, 8, 10</text>
<text x="329.7856596485427" y="161.53361715615677" class="schematex-venn-label" text-anchor="middle" data-region="B">3, 9</text>
<text x="240.99646860215626" y="158.28562054449202" class="schematex-venn-label" text-anchor="middle" data-region="A-B">6</text></g></svg>