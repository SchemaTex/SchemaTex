<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 420" width="520" height="420" class="schematex-venn" role="img"><title>Plant kingdom sample</title>
<desc>Venn/Euler diagram &quot;Plant kingdom sample&quot;: 3 sets, 0 regions.</desc>
<style>.schematex-venn { background: #ffffff; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
.schematex-venn-title { font: 600 16px sans-serif; fill: #2c3e50; }
.schematex-venn-set { stroke: #37474f; stroke-width: 1.25; }
.schematex-venn-blend-multiply { mix-blend-mode: multiply; }
.schematex-venn-blend-screen { mix-blend-mode: screen; }
.schematex-venn-setlabel { font: 600 13px sans-serif; fill: #2c3e50; }
.schematex-venn-label { font: 500 12px sans-serif; fill: #1f2937; dominant-baseline: central; text-anchor: middle; }
.schematex-venn-label-external { font: 500 11px sans-serif; fill: #1f2937; dominant-baseline: central; }
.schematex-venn-leader { stroke: #64748b; stroke-width: 0.7; fill: none; opacity: 0.8; }
.schematex-venn-leader-dot { fill: #64748b; }</style>
<text x="260" y="24" class="schematex-venn-title" text-anchor="middle">Plant kingdom sample</text>
<g class="schematex-venn-shapes schematex-venn-blend-multiply" style="mix-blend-mode: multiply"><g class="schematex-venn-set-group schematex-venn-set-group-0"><circle cx="86.66666666666666" cy="210" r="134.4" class="schematex-venn-set schematex-venn-set-0" fill="#4E79A7" fill-opacity="0.45" data-set-id="conifers"/>
<title>Set Conifers</title></g>
<g class="schematex-venn-set-group schematex-venn-set-group-1"><circle cx="260" cy="210" r="134.4" class="schematex-venn-set schematex-venn-set-1" fill="#F28E2B" fill-opacity="0.45" data-set-id="flowering"/>
<title>Set Flowering plants</title></g>
<g class="schematex-venn-set-group schematex-venn-set-group-2"><circle cx="433.33333333333337" cy="210" r="134.4" class="schematex-venn-set schematex-venn-set-2" fill="#E15759" fill-opacity="0.45" data-set-id="mosses"/>
<title>Set Mosses</title></g></g>
<g class="schematex-venn-leaders"></g>
<g class="schematex-venn-setlabels"><text x="86.66666666666666" y="69.6" class="schematex-venn-setlabel" text-anchor="middle">Conifers</text>
<text x="260" y="69.6" class="schematex-venn-setlabel" text-anchor="middle">Flowering plants</text>
<text x="433.33333333333337" y="69.6" class="schematex-venn-setlabel" text-anchor="middle">Mosses</text></g>
<g class="schematex-venn-labels"></g></svg>