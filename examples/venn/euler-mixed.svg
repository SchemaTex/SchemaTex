<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 420" width="520" height="420" class="schematex-venn" role="img"><title>Transport vehicles</title>
<desc>Venn/Euler diagram &quot;Transport vehicles&quot;: 4 sets, 0 regions.</desc>
<style>.schematex-venn { background: #ffffff; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
.schematex-venn-title { font: 600 16px sans-serif; fill: #2c3e50; }
.schematex-venn-set { stroke: #37474f; stroke-width: 1.25; }
.schematex-venn-blend-multiply { mix-blend-mode: multiply; }
.schematex-venn-blend-screen { mix-blend-mode: screen; }
.schematex-venn-setlabel { font: 600 13px sans-serif; fill: #2c3e50; }
.schematex-venn-label { font: 500 12px sans-serif; fill: #1f2937; dominant-baseline: central; text-anchor: middle; }
.schematex-venn-label-external { font: 500 11px sans-serif; fill: #1f2937; dominant-baseline: central; }
.schematex-venn-leader { stroke: #64748b; stroke-width: 0.7; fill: none; opacity: 0.8; }
.schematex-venn-leader-dot { fill: #64748b; }</style>
<text x="260" y="24" class="schematex-venn-title" text-anchor="middle">Transport vehicles</text>
<g class="schematex-venn-shapes schematex-venn-blend-multiply" style="mix-blend-mode: multiply"><g class="schematex-venn-set-group schematex-venn-set-group-0"><circle cx="130" cy="210" r="134.4" class="schematex-venn-set schematex-venn-set-0" fill="#4E79A7" fill-opacity="0.45" data-set-id="vehicles"/>
<title>Set Vehicles</title></g>
<g class="schematex-venn-set-group schematex-venn-set-group-1"><circle cx="92.368" cy="210" r="53.760000000000005" class="schematex-venn-set schematex-venn-set-1" fill="#F28E2B" fill-opacity="0.45" data-set-id="cars"/>
<title>Set Cars</title></g>
<g class="schematex-venn-set-group schematex-venn-set-group-2"><circle cx="390" cy="210" r="134.4" class="schematex-venn-set schematex-venn-set-2" fill="#E15759" fill-opacity="0.45" data-set-id="bicycles"/>
<title>Set Bicycles</title></g>
<g class="schematex-venn-set-group schematex-venn-set-group-3"><circle cx="167.632" cy="210" r="53.760000000000005" class="schematex-venn-set schematex-venn-set-3" fill="#76B7B2" fill-opacity="0.45" data-set-id="motorbikes"/>
<title>Set Motorbikes</title></g></g>
<g class="schematex-venn-leaders"></g>
<g class="schematex-venn-setlabels"><text x="130" y="69.6" class="schematex-venn-setlabel" text-anchor="middle">Vehicles</text>
<text x="92.368" y="150.24" class="schematex-venn-setlabel" text-anchor="middle">Cars</text>
<text x="390" y="69.6" class="schematex-venn-setlabel" text-anchor="middle">Bicycles</text>
<text x="167.632" y="150.24" class="schematex-venn-setlabel" text-anchor="middle">Motorbikes</text></g>
<g class="schematex-venn-labels"></g></svg>