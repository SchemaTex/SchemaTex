<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 525 322" class="lineage-diagram lineage-genogram" width="525" height="322"><title>Genogram</title>
<desc>Genogram diagram with 5 individuals across 2 generations</desc>
<defs></defs>
<style>
.lineage-genogram {
  --lineage-bg: #ffffff;
  --lineage-text: #2c3e50;
  --lineage-text-muted: #607d8b;
  --lineage-stroke: #37474f;
  --lineage-stroke-muted: #90a4ae;
  --lineage-fill: #ffffff;
  --lineage-fill-muted: #f5f7fa;
  --lineage-accent: #1565c0;
  --lineage-positive: #388e3c;
  --lineage-negative: #d32f2f;
  --lineage-neutral: #9e9e9e;
  --lineage-warn: #e65100;
  --lineage-font-title: 16px;
  --lineage-font-label: 12px;
  --lineage-font-secondary: 11px;
  --lineage-font-small: 9px;
  --lineage-stroke-normal: 1.5;
  --lineage-stroke-medium: 2;
  --lineage-stroke-thick: 2.5;
  background: #ffffff;
}
.lineage-genogram-shape { fill: #ffffff; stroke: #37474f; stroke-width: 2; stroke-linejoin: round; }
.lineage-genogram-male .lineage-genogram-shape { fill: #dbeafe; }
.lineage-genogram-female .lineage-genogram-shape { fill: #fce7f3; }
.lineage-genogram-unknown .lineage-genogram-shape { fill: #f5f5f5; }
.lineage-genogram-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; text-anchor: middle; fill: #2c3e50; }
.lineage-genogram-edge { stroke: #90a4ae; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.lineage-genogram-edge-cohabiting path { stroke-dasharray: 6,4; }
.lineage-genogram-edge-divorced .lineage-genogram-divorce-mark { stroke: #90a4ae; stroke-width: 2; }
.lineage-genogram-edge-separated .lineage-genogram-separation-mark { stroke: #90a4ae; stroke-width: 2; }
.lineage-genogram-deceased-mark { stroke: #b71c1c; stroke-width: 2; stroke-linecap: round; }
.lineage-genogram-condition-fill { fill: #1565c0; }
.lineage-genogram-age { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; pointer-events: none; }
.lineage-genogram-title { fill: #2c3e50; }
.lineage-genogram-edge-label { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; }
.lineage-genogram-index-border { stroke: #e65100; stroke-width: 3.5; fill: none; }
</style>
<g><g class="lineage-genogram-edges"><g class="lineage-genogram-edge lineage-genogram-edge-divorced" data-from="jane" data-to="tom"><path d="M 80 60 L 288 60" class="lineage-genogram-edge-path"/>
<line x1="180" y1="54" x2="188" y2="66" class="lineage-genogram-divorce-mark" stroke="#333" stroke-width="2"/>
<line x1="186" y1="54" x2="194" y2="66" class="lineage-genogram-divorce-mark" stroke="#333" stroke-width="2"/></g>
<g class="lineage-genogram-edge lineage-genogram-edge-parent-child" data-from="tom" data-to="jane"><path d="M 184 60 L 184 141" class="lineage-genogram-edge-path"/></g>
<g class="lineage-genogram-edge lineage-genogram-edge-parent-child" data-from="tom+jane" data-to="child1"><path d="M 184 60 L 184 206" class="lineage-genogram-edge-path"/></g>
<g class="lineage-genogram-edge lineage-genogram-edge-married" data-from="tom" data-to="susan"><path d="M 328 60 L 408 60" class="lineage-genogram-edge-path"/></g>
<g class="lineage-genogram-edge lineage-genogram-edge-parent-child" data-from="tom" data-to="susan"><path d="M 368 60 L 368 141" class="lineage-genogram-edge-path"/></g>
<g class="lineage-genogram-edge lineage-genogram-edge-parent-child" data-from="tom+susan" data-to="child2"><path d="M 368 60 L 368 206" class="lineage-genogram-edge-path"/></g></g>
<g class="lineage-genogram-emotional-edges"></g>
<g class="lineage-genogram-generation lineage-genogram-generation-0" data-generation="0"><g class="lineage-genogram-node lineage-genogram-female" data-individual-id="jane" transform="translate(60, 60)"><title>Jane (1952)</title>
<circle cx="0" cy="0" r="20" class="lineage-genogram-shape"/></g>
<g class="lineage-genogram-node lineage-genogram-male" data-individual-id="tom" transform="translate(308, 60)"><title>Tom (1950)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-genogram-shape"/></g>
<g class="lineage-genogram-node lineage-genogram-female" data-individual-id="susan" transform="translate(428, 60)"><title>Susan (1960)</title>
<circle cx="0" cy="0" r="20" class="lineage-genogram-shape"/></g></g>
<g class="lineage-genogram-generation lineage-genogram-generation-1" data-generation="1"><g class="lineage-genogram-node lineage-genogram-male" data-individual-id="child1" transform="translate(184, 226)"><title>Child1 (1975)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-genogram-shape"/></g>
<g class="lineage-genogram-node lineage-genogram-female" data-individual-id="child2" transform="translate(368, 226)"><title>Child2 (1985)</title>
<circle cx="0" cy="0" r="20" class="lineage-genogram-shape"/></g></g>
<g class="lineage-genogram-labels"><text x="60" y="98" class="lineage-genogram-label" data-individual-id="jane">Jane (b. 1952)</text>
<text x="308" y="98" class="lineage-genogram-label" data-individual-id="tom">Tom (b. 1950)</text>
<text x="428" y="98" class="lineage-genogram-label" data-individual-id="susan">Susan (b. 1960)</text>
<text x="184" y="264" class="lineage-genogram-label" data-individual-id="child1">Child1 (b. 1975)</text>
<text x="368" y="264" class="lineage-genogram-label" data-individual-id="child2">Child2 (b. 1985)</text></g>
<g class="lineage-genogram-edge-labels"></g></g></svg>