<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 360 488" class="lineage-diagram lineage-genogram" width="360" height="488"><title>Genogram</title>
<desc>Genogram diagram with 7 individuals across 3 generations</desc>
<defs></defs>
<style>
.lineage-shape { fill: white; stroke: #333; stroke-width: 2; }
.lineage-label { font-family: system-ui; font-size: 12px; text-anchor: middle; fill: #333; }
.lineage-edge { stroke: #333; stroke-width: 2; fill: none; }
.lineage-edge-cohabiting path { stroke-dasharray: 6,4; }
.lineage-edge-divorced .lineage-divorce-mark { stroke: #333; stroke-width: 2; }
.lineage-edge-separated .lineage-separation-mark { stroke: #333; stroke-width: 2; }
.lineage-deceased-mark { stroke: #333; stroke-width: 2; }
</style>
<g class="lineage-edges"><g class="lineage-edge lineage-edge-married" data-from="grandpa" data-to="grandma"><path d="M 80 60 L 160 60" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="grandpa" data-to="grandma"><path d="M 120 60 L 120 141" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="grandpa" data-to="grandma"><path d="M 60 141 L 300 141" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="grandpa+grandma" data-to="dad"><path d="M 60 141 L 60 206" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="grandpa+grandma" data-to="aunt"><path d="M 300 141 L 300 206" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-married" data-from="dad" data-to="mom"><path d="M 80 226 L 160 226" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="dad" data-to="mom"><path d="M 120 226 L 120 307" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="dad" data-to="mom"><path d="M 60 307 L 180 307" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="dad+mom" data-to="me"><path d="M 60 307 L 60 372" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="dad+mom" data-to="sister"><path d="M 180 307 L 180 372" class="lineage-edge-path"/></g></g>
<g class="lineage-generation lineage-generation-0" data-generation="0"><g class="lineage-node lineage-male lineage-deceased" data-individual-id="grandpa" transform="translate(60, 60)"><title>Grandpa (1930)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-shape"/>
<line x1="-20" y1="-20" x2="20" y2="20" class="lineage-deceased-mark" stroke="#333" stroke-width="2"/>
<line x1="20" y1="-20" x2="-20" y2="20" class="lineage-deceased-mark" stroke="#333" stroke-width="2"/></g>
<g class="lineage-node lineage-female" data-individual-id="grandma" transform="translate(180, 60)"><title>Grandma (1932)</title>
<circle cx="0" cy="0" r="20" class="lineage-shape"/></g></g>
<g class="lineage-generation lineage-generation-1" data-generation="1"><g class="lineage-node lineage-male" data-individual-id="dad" transform="translate(60, 226)"><title>Dad (1955)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-shape"/></g>
<g class="lineage-node lineage-female" data-individual-id="mom" transform="translate(180, 226)"><title>Mom (1957)</title>
<circle cx="0" cy="0" r="20" class="lineage-shape"/></g>
<g class="lineage-node lineage-female" data-individual-id="aunt" transform="translate(300, 226)"><title>Aunt (1958)</title>
<circle cx="0" cy="0" r="20" class="lineage-shape"/></g></g>
<g class="lineage-generation lineage-generation-2" data-generation="2"><g class="lineage-node lineage-male" data-individual-id="me" transform="translate(60, 392)"><title>Me (1985)</title>
