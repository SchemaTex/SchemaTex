<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 120 156" class="lineage-diagram lineage-genogram" width="120" height="156"><title>Genogram</title>
<desc>Genogram diagram with 1 individuals across 1 generations</desc>
<defs></defs>
<style>
.lineage-shape { fill: white; stroke: #333; stroke-width: 2; }
.lineage-label { font-family: system-ui; font-size: 12px; text-anchor: middle; fill: #333; }
.lineage-edge { stroke: #333; stroke-width: 2; fill: none; }
.lineage-edge-cohabiting path { stroke-dasharray: 6,4; }
.lineage-edge-divorced .lineage-divorce-mark { stroke: #333; stroke-width: 2; }
.lineage-edge-separated .lineage-separation-mark { stroke: #333; stroke-width: 2; }
.lineage-deceased-mark { stroke: #333; stroke-width: 2; }
</style>
<g class="lineage-edges"></g>
<g class="lineage-generation lineage-generation-0" data-generation="0"><g class="lineage-node lineage-female" data-individual-id="solo" transform="translate(60, 60)"><title>Solo (1990)</title>
<circle cx="0" cy="0" r="20" class="lineage-shape"/></g></g>
<g class="lineage-labels"><text x="60" y="98" class="lineage-label" data-individual-id="solo">Solo (1990)</text></g></svg>