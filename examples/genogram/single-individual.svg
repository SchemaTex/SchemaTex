<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 153.2 156" class="schematex-diagram schematex-genogram" width="153.2" height="156"><title>Genogram</title>
<desc>Genogram diagram with 1 individuals across 1 generations</desc>
<defs></defs>
<style>
.schematex-genogram {
  --schematex-bg: #ffffff;
  --schematex-text: #2c3e50;
  --schematex-text-muted: #607d8b;
  --schematex-stroke: #37474f;
  --schematex-stroke-muted: #90a4ae;
  --schematex-fill: #ffffff;
  --schematex-fill-muted: #f5f7fa;
  --schematex-accent: #1565c0;
  --schematex-positive: #388e3c;
  --schematex-negative: #d32f2f;
  --schematex-neutral: #9e9e9e;
  --schematex-warn: #e65100;
  --schematex-font-title: 16px;
  --schematex-font-label: 12px;
  --schematex-font-secondary: 11px;
  --schematex-font-small: 9px;
  --schematex-stroke-normal: 1.5;
  --schematex-stroke-medium: 2;
  --schematex-stroke-thick: 2.5;
  background: #ffffff;
}
.schematex-genogram-shape { fill: #ffffff; stroke: #37474f; stroke-width: 2; stroke-linejoin: round; }
.schematex-genogram-male .schematex-genogram-shape { fill: #dbeafe; }
.schematex-genogram-female .schematex-genogram-shape { fill: #fce7f3; }
.schematex-genogram-unknown .schematex-genogram-shape { fill: #f5f5f5; }
.schematex-genogram-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; text-anchor: middle; fill: #2c3e50; }
.schematex-genogram-edge { stroke: #90a4ae; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.schematex-genogram-edge-cohabiting path { stroke-dasharray: 6,4; }
.schematex-genogram-edge-divorced .schematex-genogram-divorce-mark { stroke: #90a4ae; stroke-width: 2; }
.schematex-genogram-edge-separated .schematex-genogram-separation-mark { stroke: #90a4ae; stroke-width: 2; }
.schematex-genogram-deceased-mark { stroke: #b71c1c; stroke-width: 2; stroke-linecap: round; }
.schematex-genogram-condition-fill { fill: #1565c0; }
.schematex-genogram-age { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; pointer-events: none; }
.schematex-genogram-title { fill: #2c3e50; }
.schematex-genogram-edge-label { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; }
.schematex-genogram-index-border { stroke: #e65100; stroke-width: 3.5; fill: none; }
</style>
<g><g class="schematex-genogram-edges"></g>
<g class="schematex-genogram-emotional-edges"></g>
<g class="schematex-genogram-generation schematex-genogram-generation-0" data-generation="0"><g class="schematex-genogram-node schematex-genogram-female" data-individual-id="solo" transform="translate(60, 60)"><title>Solo (1990)</title>
<circle cx="0" cy="0" r="20" class="schematex-genogram-shape"/></g></g>
<g class="schematex-genogram-labels"><text x="60" y="98" class="schematex-genogram-label" data-individual-id="solo">Solo (b. 1990)</text></g>
<g class="schematex-genogram-edge-labels"></g></g></svg>