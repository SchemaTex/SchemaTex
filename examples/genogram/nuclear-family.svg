<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 240 322" class="lineage-diagram lineage-genogram" width="240" height="322"><title>Genogram</title>
<desc>Genogram diagram with 4 individuals across 2 generations</desc>
<defs></defs>
<style>
.lineage-shape { fill: white; stroke: #333; stroke-width: 2; }
.lineage-label { font-family: system-ui; font-size: 12px; text-anchor: middle; fill: #333; }
.lineage-edge { stroke: #333; stroke-width: 2; fill: none; }
.lineage-edge-cohabiting path { stroke-dasharray: 6,4; }
.lineage-edge-divorced .lineage-divorce-mark { stroke: #333; stroke-width: 2; }
.lineage-edge-separated .lineage-separation-mark { stroke: #333; stroke-width: 2; }
.lineage-deceased-mark { stroke: #333; stroke-width: 2; }
</style>
<g class="lineage-edges"><g class="lineage-edge lineage-edge-married" data-from="john" data-to="mary"><path d="M 80 60 L 160 60" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="john" data-to="mary"><path d="M 120 60 L 120 141" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="john" data-to="mary"><path d="M 60 141 L 180 141" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="john+mary" data-to="alice"><path d="M 60 141 L 60 206" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="john+mary" data-to="bob"><path d="M 180 141 L 180 206" class="lineage-edge-path"/></g></g>
<g class="lineage-generation lineage-generation-0" data-generation="0"><g class="lineage-node lineage-male" data-individual-id="john" transform="translate(60, 60)"><title>John (1950)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-shape"/></g>
<g class="lineage-node lineage-female" data-individual-id="mary" transform="translate(180, 60)"><title>Mary (1955)</title>
<circle cx="0" cy="0" r="20" class="lineage-shape"/></g></g>
<g class="lineage-generation lineage-generation-1" data-generation="1"><g class="lineage-node lineage-female" data-individual-id="alice" transform="translate(60, 226)"><title>Alice (1980)</title>
<circle cx="0" cy="0" r="20" class="lineage-shape"/></g>
<g class="lineage-node lineage-male" data-individual-id="bob" transform="translate(180, 226)"><title>Bob (1983)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-shape"/></g></g>
<g class="lineage-labels"><text x="60" y="98" class="lineage-label" data-individual-id="john">John (1950)</text>
<text x="180" y="98" class="lineage-label" data-individual-id="mary">Mary (1955)</text>
<text x="60" y="264" class="lineage-label" data-individual-id="alice">Alice (1980)</text>
<text x="180" y="264" class="lineage-label" data-individual-id="bob">Bob (1983)</text></g></svg>