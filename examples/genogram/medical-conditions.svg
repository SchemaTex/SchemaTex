<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 281.6 322" class="lineage-diagram lineage-genogram" width="281.6" height="322"><title>Genogram</title>
<desc>Genogram diagram with 3 individuals across 2 generations</desc>
<defs><clipPath id="lineage-genogram-clip-half-left-rect"><rect x="0" y="0" width="50%" height="100%"/></clipPath>
<clipPath id="lineage-genogram-clip-half-left-circle"><rect x="-50" y="-50" width="50" height="100"/></clipPath>
<pattern id="lineage-genogram-pattern-striped" patternUnits="userSpaceOnUse" width="4" height="4"><path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="#333" stroke-width="1"/></pattern></defs>
<style>
.lineage-genogram {
  --lineage-bg: #ffffff;
  --lineage-text: #2c3e50;
  --lineage-text-muted: #607d8b;
  --lineage-stroke: #37474f;
  --lineage-stroke-muted: #90a4ae;
  --lineage-fill: #ffffff;
  --lineage-fill-muted: #f5f7fa;
  --lineage-accent: #1565c0;
  --lineage-positive: #388e3c;
  --lineage-negative: #d32f2f;
  --lineage-neutral: #9e9e9e;
  --lineage-warn: #e65100;
  --lineage-font-title: 16px;
  --lineage-font-label: 12px;
  --lineage-font-secondary: 11px;
  --lineage-font-small: 9px;
  --lineage-stroke-normal: 1.5;
  --lineage-stroke-medium: 2;
  --lineage-stroke-thick: 2.5;
  background: #ffffff;
}
.lineage-genogram-shape { fill: #ffffff; stroke: #37474f; stroke-width: 2; stroke-linejoin: round; }
.lineage-genogram-male .lineage-genogram-shape { fill: #dbeafe; }
.lineage-genogram-female .lineage-genogram-shape { fill: #fce7f3; }
.lineage-genogram-unknown .lineage-genogram-shape { fill: #f5f5f5; }
.lineage-genogram-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; text-anchor: middle; fill: #2c3e50; }
.lineage-genogram-edge { stroke: #90a4ae; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.lineage-genogram-edge-cohabiting path { stroke-dasharray: 6,4; }
.lineage-genogram-edge-divorced .lineage-genogram-divorce-mark { stroke: #90a4ae; stroke-width: 2; }
.lineage-genogram-edge-separated .lineage-genogram-separation-mark { stroke: #90a4ae; stroke-width: 2; }
.lineage-genogram-deceased-mark { stroke: #b71c1c; stroke-width: 2; stroke-linecap: round; }
.lineage-genogram-condition-fill { fill: #1565c0; }
.lineage-genogram-age { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; pointer-events: none; }
.lineage-genogram-title { fill: #2c3e50; }
.lineage-genogram-edge-label { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; }
.lineage-genogram-index-border { stroke: #e65100; stroke-width: 3.5; fill: none; }
</style>
<g><g class="lineage-genogram-edges"><g class="lineage-genogram-edge lineage-genogram-edge-married" data-from="father" data-to="mother"><path d="M 80.8 60 L 160.8 60" class="lineage-genogram-edge-path"/></g>
<g class="lineage-genogram-edge lineage-genogram-edge-parent-child" data-from="father" data-to="mother"><path d="M 120.8 60 L 120.8 141" class="lineage-genogram-edge-path"/></g>
<g class="lineage-genogram-edge lineage-genogram-edge-parent-child" data-from="father+mother" data-to="son"><path d="M 120.8 60 L 120.8 206" class="lineage-genogram-edge-path"/></g></g>
<g class="lineage-genogram-emotional-edges"></g>
<g class="lineage-genogram-generation lineage-genogram-generation-0" data-generation="0"><g class="lineage-genogram-node lineage-genogram-male" data-individual-id="father" transform="translate(60.8, 60)"><title>Father (1945)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-genogram-shape"/>
<rect x="-20" y="-20" width="40" height="40" fill="#333" class="lineage-genogram-condition-fill lineage-genogram-condition-heart-disease"/>
<rect x="-20" y="-20" width="40" height="40" clip-path="url(#lineage-genogram-clip-half-left-rect)" fill="#333" class="lineage-genogram-condition-fill lineage-genogram-condition-diabetes"/></g>
<g class="lineage-genogram-node lineage-genogram-female" data-individual-id="mother" transform="translate(180.8, 60)"><title>Mother (1948)</title>
<circle cx="0" cy="0" r="20" class="lineage-genogram-shape"/></g></g>
<g class="lineage-genogram-generation lineage-genogram-generation-1" data-generation="1"><g class="lineage-genogram-node lineage-genogram-male" data-individual-id="son" transform="translate(120.8, 226)"><title>Son (1970)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-genogram-shape"/>
<rect x="-20" y="-20" width="40" height="40" fill="url(#lineage-genogram-pattern-striped)" class="lineage-genogram-condition-fill lineage-genogram-condition-diabetes"/></g></g>
<g class="lineage-genogram-labels"><text x="60.8" y="98" class="lineage-genogram-label" data-individual-id="father">Father (b. 1945)</text>
<text x="180.8" y="98" class="lineage-genogram-label" data-individual-id="mother">Mother (b. 1948)</text>
<text x="120.8" y="264" class="lineage-genogram-label" data-individual-id="son">Son (b. 1970)</text></g>
<g class="lineage-genogram-edge-labels"></g></g></svg>