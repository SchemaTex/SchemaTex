<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 240 322" class="lineage-diagram lineage-genogram" width="240" height="322"><title>Genogram</title>
<desc>Genogram diagram with 3 individuals across 2 generations</desc>
<defs><clipPath id="lineage-clip-half-left-rect"><rect x="0" y="0" width="50%" height="100%"/></clipPath>
<clipPath id="lineage-clip-half-left-circle"><rect x="-50" y="-50" width="50" height="100"/></clipPath>
<pattern id="lineage-pattern-striped" patternUnits="userSpaceOnUse" width="4" height="4"><path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="#333" stroke-width="1"/></pattern></defs>
<style>
.lineage-shape { fill: white; stroke: #333; stroke-width: 2; }
.lineage-label { font-family: system-ui; font-size: 12px; text-anchor: middle; fill: #333; }
.lineage-edge { stroke: #333; stroke-width: 2; fill: none; }
.lineage-edge-cohabiting path { stroke-dasharray: 6,4; }
.lineage-edge-divorced .lineage-divorce-mark { stroke: #333; stroke-width: 2; }
.lineage-edge-separated .lineage-separation-mark { stroke: #333; stroke-width: 2; }
.lineage-deceased-mark { stroke: #333; stroke-width: 2; }
</style>
<g class="lineage-edges"><g class="lineage-edge lineage-edge-married" data-from="father" data-to="mother"><path d="M 80 60 L 160 60" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="father" data-to="mother"><path d="M 120 60 L 120 141" class="lineage-edge-path"/></g>
<g class="lineage-edge lineage-edge-parent-child" data-from="father+mother" data-to="son"><path d="M 120 60 L 120 206" class="lineage-edge-path"/></g></g>
<g class="lineage-generation lineage-generation-0" data-generation="0"><g class="lineage-node lineage-male" data-individual-id="father" transform="translate(60, 60)"><title>Father (1945)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-shape"/>
<rect x="-20" y="-20" width="40" height="40" fill="#333" class="lineage-condition-fill lineage-condition-heart-disease"/>
<rect x="-20" y="-20" width="40" height="40" clip-path="url(#lineage-clip-half-left-rect)" fill="#333" class="lineage-condition-fill lineage-condition-diabetes"/></g>
<g class="lineage-node lineage-female" data-individual-id="mother" transform="translate(180, 60)"><title>Mother (1948)</title>
<circle cx="0" cy="0" r="20" class="lineage-shape"/></g></g>
<g class="lineage-generation lineage-generation-1" data-generation="1"><g class="lineage-node lineage-male" data-individual-id="son" transform="translate(120, 226)"><title>Son (1970)</title>
<rect x="-20" y="-20" width="40" height="40" class="lineage-shape"/>
<rect x="-20" y="-20" width="40" height="40" fill="url(#lineage-pattern-striped)" class="lineage-condition-fill lineage-condition-diabetes"/></g></g>
<g class="lineage-labels"><text x="60" y="98" class="lineage-label" data-individual-id="father">Father (1945)</text>
<text x="180" y="98" class="lineage-label" data-individual-id="mother">Mother (1948)</text>
<text x="120" y="264" class="lineage-label" data-individual-id="son">Son (1970)</text></g></svg>