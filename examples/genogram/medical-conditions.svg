<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 281.6 322" class="schematex-diagram schematex-genogram" width="281.6" height="322"><title>Genogram</title>
<desc>Genogram diagram with 3 individuals across 2 generations</desc>
<defs><clipPath id="schematex-genogram-clip-half-left-rect"><rect x="0" y="0" width="50%" height="100%"/></clipPath>
<clipPath id="schematex-genogram-clip-half-left-circle"><rect x="-50" y="-50" width="50" height="100"/></clipPath>
<pattern id="schematex-genogram-pattern-striped" patternUnits="userSpaceOnUse" width="4" height="4"><path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="#333" stroke-width="1"/></pattern></defs>
<style>
.schematex-genogram {
  --schematex-bg: #ffffff;
  --schematex-text: #2c3e50;
  --schematex-text-muted: #607d8b;
  --schematex-stroke: #37474f;
  --schematex-stroke-muted: #90a4ae;
  --schematex-fill: #ffffff;
  --schematex-fill-muted: #f5f7fa;
  --schematex-accent: #1565c0;
  --schematex-positive: #388e3c;
  --schematex-negative: #d32f2f;
  --schematex-neutral: #9e9e9e;
  --schematex-warn: #e65100;
  --schematex-font-title: 16px;
  --schematex-font-label: 12px;
  --schematex-font-secondary: 11px;
  --schematex-font-small: 9px;
  --schematex-stroke-normal: 1.5;
  --schematex-stroke-medium: 2;
  --schematex-stroke-thick: 2.5;
  background: #ffffff;
}
.schematex-genogram-shape { fill: #ffffff; stroke: #37474f; stroke-width: 2; stroke-linejoin: round; }
.schematex-genogram-male .schematex-genogram-shape { fill: #dbeafe; }
.schematex-genogram-female .schematex-genogram-shape { fill: #fce7f3; }
.schematex-genogram-unknown .schematex-genogram-shape { fill: #f5f5f5; }
.schematex-genogram-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; text-anchor: middle; fill: #2c3e50; }
.schematex-genogram-edge { stroke: #90a4ae; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.schematex-genogram-edge-cohabiting path { stroke-dasharray: 6,4; }
.schematex-genogram-edge-divorced .schematex-genogram-divorce-mark { stroke: #90a4ae; stroke-width: 2; }
.schematex-genogram-edge-separated .schematex-genogram-separation-mark { stroke: #90a4ae; stroke-width: 2; }
.schematex-genogram-deceased-mark { stroke: #b71c1c; stroke-width: 2; stroke-linecap: round; }
.schematex-genogram-condition-fill { fill: #1565c0; }
.schematex-genogram-age { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; pointer-events: none; }
.schematex-genogram-title { fill: #2c3e50; }
.schematex-genogram-edge-label { font-family: system-ui, -apple-system, sans-serif; fill: #2c3e50; }
.schematex-genogram-index-border { stroke: #e65100; stroke-width: 3.5; fill: none; }
</style>
<g><g class="schematex-genogram-edges"><g class="schematex-genogram-edge schematex-genogram-edge-married" data-from="father" data-to="mother"><path d="M 80.8 60 L 160.8 60" class="schematex-genogram-edge-path"/></g>
<g class="schematex-genogram-edge schematex-genogram-edge-parent-child" data-from="father" data-to="mother"><path d="M 120.8 60 L 120.8 141" class="schematex-genogram-edge-path"/></g>
<g class="schematex-genogram-edge schematex-genogram-edge-parent-child" data-from="father+mother" data-to="son"><path d="M 120.8 60 L 120.8 206" class="schematex-genogram-edge-path"/></g></g>
<g class="schematex-genogram-emotional-edges"></g>
<g class="schematex-genogram-generation schematex-genogram-generation-0" data-generation="0"><g class="schematex-genogram-node schematex-genogram-male" data-individual-id="father" transform="translate(60.8, 60)"><title>Father (1945)</title>
<rect x="-20" y="-20" width="40" height="40" class="schematex-genogram-shape"/>
<rect x="-20" y="-20" width="40" height="40" fill="#333" class="schematex-genogram-condition-fill schematex-genogram-condition-heart-disease"/>
<rect x="-20" y="-20" width="40" height="40" clip-path="url(#schematex-genogram-clip-half-left-rect)" fill="#333" class="schematex-genogram-condition-fill schematex-genogram-condition-diabetes"/></g>
<g class="schematex-genogram-node schematex-genogram-female" data-individual-id="mother" transform="translate(180.8, 60)"><title>Mother (1948)</title>
<circle cx="0" cy="0" r="20" class="schematex-genogram-shape"/></g></g>
<g class="schematex-genogram-generation schematex-genogram-generation-1" data-generation="1"><g class="schematex-genogram-node schematex-genogram-male" data-individual-id="son" transform="translate(120.8, 226)"><title>Son (1970)</title>
<rect x="-20" y="-20" width="40" height="40" class="schematex-genogram-shape"/>
<rect x="-20" y="-20" width="40" height="40" fill="url(#schematex-genogram-pattern-striped)" class="schematex-genogram-condition-fill schematex-genogram-condition-diabetes"/></g></g>
<g class="schematex-genogram-labels"><text x="60.8" y="98" class="schematex-genogram-label" data-individual-id="father">Father (b. 1945)</text>
<text x="180.8" y="98" class="schematex-genogram-label" data-individual-id="mother">Mother (b. 1948)</text>
<text x="120.8" y="264" class="schematex-genogram-label" data-individual-id="son">Son (b. 1970)</text></g>
<g class="schematex-genogram-edge-labels"></g></g></svg>