<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 670 116" width="670" height="116" class="sx-fc" data-diagram-type="flowchart" data-direction="LR" role="graphics-document"><title>Pipeline (LR) — Flowchart</title>
<desc>Flowchart with 5 nodes and 4 edges.</desc>
<style>.sx-fc { background: #ffffff; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
.sx-fc-node { fill: #f5f7fa; stroke: #37474f; stroke-width: 1.5; stroke-linejoin: round; }
.sx-fc-node-stadium { fill: #dbeafe; stroke: #37474f; }
.sx-fc-node-diamond { fill: #fef3c7; stroke: #37474f; }
.sx-fc-node-round { fill: #dcfce7; stroke: #37474f; }
.sx-fc-node-text { fill: #2c3e50; font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; }
/* Semantic class presets (applied via 'class A start') — override shape fills */
.sx-fc-class-start    > .sx-fc-node { fill: #f0ece0; stroke: #9a8b6a; }
.sx-fc-class-start    > .sx-fc-node-text { fill: #5c4e2e; font-weight: 600; }
.sx-fc-class-process  > .sx-fc-node { fill: #e8e4ff; stroke: #8b7dd8; }
.sx-fc-class-process  > .sx-fc-node-text { fill: #4c3a8f; font-weight: 600; }
.sx-fc-class-decision > .sx-fc-node { fill: #fde8c8; stroke: #d4985c; }
.sx-fc-class-decision > .sx-fc-node-text { fill: #8a5a1f; font-weight: 600; }
.sx-fc-class-success  > .sx-fc-node { fill: #d4f0e0; stroke: #7bc19a; }
.sx-fc-class-success  > .sx-fc-node-text { fill: #1e5a3a; font-weight: 600; }
.sx-fc-class-danger   > .sx-fc-node { fill: #fbe0dc; stroke: #d89181; }
.sx-fc-class-danger   > .sx-fc-node-text { fill: #8a3525; font-weight: 600; }
.sx-fc-class-neutral  > .sx-fc-node { fill: #ececec; stroke: #a0a0a0; }
.sx-fc-class-neutral  > .sx-fc-node-text { fill: #555555; font-weight: 600; }
.sx-fc-edge { fill: none; stroke: #90a4ae; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.sx-fc-edge-thick { stroke: #37474f; stroke-width: 2.4; }
.sx-fc-edge-dashed { stroke-dasharray: 5 3; }
.sx-fc-edge-dotted { stroke-dasharray: 1.5 3; }
.sx-fc-edge-label { fill: #607d8b; font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; }
.sx-fc-edge-label-bg { fill: #ffffff; fill-opacity: 0.96; stroke: #90a4ae; stroke-width: 0.5; }
.sx-fc-title { fill: #2c3e50; font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; }</style>
<defs><marker id="sx-fc-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
  <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="context-stroke"/>
</marker>
<marker id="sx-fc-arrow-o" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
  <circle cx="4" cy="4" r="3" fill="none" stroke="context-stroke" stroke-width="1"/>
</marker>
<marker id="sx-fc-arrow-x" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
  <path d="M1,1 L7,7 M1,7 L7,1" stroke="context-stroke" stroke-width="1.2"/>
</marker></defs>
<text x="335" y="16" class="sx-fc-title" text-anchor="middle">Pipeline (LR)</text>
<g transform="translate(0 24)"><g class="sx-fc-edges"><g data-edge-id="A-&gt;B" data-kind="solid" data-from="A" data-to="B"><path d="M 96 46 L 124 46 L 124 46 L 152 46" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>A → B</title></g>
<g data-edge-id="B-&gt;C" data-kind="solid" data-from="B" data-to="C"><path d="M 224 46 L 252 46 L 252 46 L 280 46" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>B → C</title></g>
<g data-edge-id="C-&gt;D" data-kind="solid" data-from="C" data-to="D"><path d="M 367 46 L 395 46 L 395 46 L 423 46" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>C → D</title></g>
<g data-edge-id="D-&gt;E" data-kind="solid" data-from="D" data-to="E"><path d="M 517 46 L 545 46 L 545 46 L 573 46" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>D → E</title></g></g>
<g class="sx-fc-nodes"><g data-node-id="A" data-shape="stadium" data-layer="0" class="sx-fc-node-g" transform="translate(24 24)"><rect x="0" y="0" width="72" height="44" rx="22" ry="22" class="sx-fc-node sx-fc-node-stadium"/>
<text x="36" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Input</text>
<title>Input</title></g>
<g data-node-id="B" data-shape="rect" data-layer="1" class="sx-fc-node-g" transform="translate(152 24)"><rect x="0" y="0" width="72" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="36" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Parse</text>
<title>Parse</title></g>
<g data-node-id="C" data-shape="rect" data-layer="2" class="sx-fc-node-g" transform="translate(280 24)"><rect x="0" y="0" width="87" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="43.5" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Validate</text>
<title>Validate</title></g>
<g data-node-id="D" data-shape="rect" data-layer="3" class="sx-fc-node-g" transform="translate(423 24)"><rect x="0" y="0" width="94" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="47" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Transform</text>
<title>Transform</title></g>
<g data-node-id="E" data-shape="stadium" data-layer="4" class="sx-fc-node-g" transform="translate(573 24)"><rect x="0" y="0" width="73" height="44" rx="22" ry="22" class="sx-fc-node sx-fc-node-stadium"/>
<text x="36.5" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Output</text>
<title>Output</title></g></g></g></svg>