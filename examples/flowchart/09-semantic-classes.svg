<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 296.5 724" width="296.5" height="724" class="sx-fc" data-diagram-type="flowchart" data-direction="TB" role="graphics-document"><title>Signup &amp; Subscription Funnel — Flowchart</title>
<desc>Flowchart with 8 nodes and 7 edges.</desc>
<style>.sx-fc { background: #ffffff; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
.sx-fc-node { fill: #f5f7fa; stroke: #37474f; stroke-width: 1.5; stroke-linejoin: round; }
.sx-fc-node-stadium { fill: #dbeafe; stroke: #37474f; }
.sx-fc-node-diamond { fill: #fef3c7; stroke: #37474f; }
.sx-fc-node-round { fill: #dcfce7; stroke: #37474f; }
.sx-fc-node-text { fill: #2c3e50; font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; }
/* Semantic class presets (applied via 'class A start') — override shape fills */
.sx-fc-class-start    > .sx-fc-node { fill: #f0ece0; stroke: #9a8b6a; }
.sx-fc-class-start    > .sx-fc-node-text { fill: #5c4e2e; font-weight: 600; }
.sx-fc-class-process  > .sx-fc-node { fill: #e8e4ff; stroke: #8b7dd8; }
.sx-fc-class-process  > .sx-fc-node-text { fill: #4c3a8f; font-weight: 600; }
.sx-fc-class-decision > .sx-fc-node { fill: #fde8c8; stroke: #d4985c; }
.sx-fc-class-decision > .sx-fc-node-text { fill: #8a5a1f; font-weight: 600; }
.sx-fc-class-success  > .sx-fc-node { fill: #d4f0e0; stroke: #7bc19a; }
.sx-fc-class-success  > .sx-fc-node-text { fill: #1e5a3a; font-weight: 600; }
.sx-fc-class-danger   > .sx-fc-node { fill: #fbe0dc; stroke: #d89181; }
.sx-fc-class-danger   > .sx-fc-node-text { fill: #8a3525; font-weight: 600; }
.sx-fc-class-neutral  > .sx-fc-node { fill: #ececec; stroke: #a0a0a0; }
.sx-fc-class-neutral  > .sx-fc-node-text { fill: #555555; font-weight: 600; }
.sx-fc-edge { fill: none; stroke: #90a4ae; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.sx-fc-edge-thick { stroke: #37474f; stroke-width: 2.4; }
.sx-fc-edge-dashed { stroke-dasharray: 5 3; }
.sx-fc-edge-dotted { stroke-dasharray: 1.5 3; }
.sx-fc-edge-label { fill: #607d8b; font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; }
.sx-fc-edge-label-bg { fill: #ffffff; fill-opacity: 0.96; stroke: #90a4ae; stroke-width: 0.5; }
.sx-fc-title { fill: #2c3e50; font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; }</style>
<defs><marker id="sx-fc-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
  <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="context-stroke"/>
</marker>
<marker id="sx-fc-arrow-o" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
  <circle cx="4" cy="4" r="3" fill="none" stroke="context-stroke" stroke-width="1"/>
</marker>
<marker id="sx-fc-arrow-x" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
  <path d="M1,1 L7,7 M1,7 L7,1" stroke="context-stroke" stroke-width="1.2"/>
</marker></defs>
<text x="148.25" y="16" class="sx-fc-title" text-anchor="middle">Signup &amp; Subscription Funnel</text>
<g transform="translate(0 24)"><g class="sx-fc-edges"><g data-edge-id="A-&gt;B" data-kind="solid" data-from="A" data-to="B"><path d="M 98 68 L 98 96 L 98 96 L 98 124" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>A → B</title></g>
<g data-edge-id="B-&gt;C" data-kind="solid" data-from="B" data-to="C"><path d="M 98 168 L 98 196 L 98 196 L 98 224" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>B → C</title></g>
<g data-edge-id="C-&gt;D" data-kind="solid" data-from="C" data-to="D"><path d="M 98 268 L 98 296 L 98 296 L 98 324" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>C → D</title></g>
<g data-edge-id="D-&gt;E" data-kind="solid" data-from="D" data-to="E"><path d="M 98 368 L 98 396 L 98 396 L 98 424" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>D → E</title></g>
<g data-edge-id="E-&gt;F" data-kind="solid" data-from="E" data-to="F"><path d="M 98 476 L 98 504 L 98 504 L 98 532" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>E → F: yes</title>
<g class="sx-fc-edge-label-g"><text x="104" y="504" class="sx-fc-edge-label" text-anchor="start" dominant-baseline="central">yes</text></g></g>
<g data-edge-id="E-&gt;G" data-kind="solid" data-from="E" data-to="G"><path d="M 98 476 L 98 504 L 236.5 504 L 236.5 532" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>E → G: no</title>
<g class="sx-fc-edge-label-g"><text x="167.25" y="496" class="sx-fc-edge-label" text-anchor="middle" dominant-baseline="central">no</text></g></g>
<g data-edge-id="F-&gt;H" data-kind="solid" data-from="F" data-to="H"><path d="M 98 576 L 98 604 L 98 604 L 98 632" class="sx-fc-edge" marker-end="url(#sx-fc-arrow)"/>
<title>F → H</title></g></g>
<g class="sx-fc-nodes"><g data-node-id="A" data-shape="rect" data-layer="0" data-classes="start" class="sx-fc-node-g sx-fc-class-start" transform="translate(37.5 24)"><rect x="0" y="0" width="121" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="60.5" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Visit Landing</text>
<title>Visit Landing</title></g>
<g data-node-id="B" data-shape="rect" data-layer="1" data-classes="process" class="sx-fc-node-g sx-fc-class-process" transform="translate(37.5 124)"><rect x="0" y="0" width="121" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="60.5" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Click Sign Up</text>
<title>Click Sign Up</title></g>
<g data-node-id="C" data-shape="rect" data-layer="2" data-classes="process" class="sx-fc-node-g sx-fc-class-process" transform="translate(41 224)"><rect x="0" y="0" width="114" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="57" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Verify Email</text>
<title>Verify Email</title></g>
<g data-node-id="D" data-shape="rect" data-layer="3" data-classes="success" class="sx-fc-node-g sx-fc-class-success" transform="translate(44.5 324)"><rect x="0" y="0" width="107" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="53.5" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Enter Trial</text>
<title>Enter Trial</title></g>
<g data-node-id="E" data-shape="diamond" data-layer="4" data-classes="decision" class="sx-fc-node-g sx-fc-class-decision" transform="translate(35.5 424)"><polygon points="62.5,0 125,26 62.5,52 0,26" class="sx-fc-node sx-fc-node-diamond"/>
<text x="62.5" y="26" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Subscribe?</text>
<title>Subscribe?</title></g>
<g data-node-id="F" data-shape="rect" data-layer="5" data-classes="success" class="sx-fc-node-g sx-fc-class-success" transform="translate(27.5 532)"><rect x="0" y="0" width="141" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="70.5" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Complete Payment</text>
<title>Complete Payment</title></g>
<g data-node-id="G" data-shape="rect" data-layer="5" data-classes="neutral" class="sx-fc-node-g sx-fc-class-neutral" transform="translate(200.5 532)"><rect x="0" y="0" width="72" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="36" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Churn</text>
<title>Churn</title></g>
<g data-node-id="H" data-shape="rect" data-layer="6" data-classes="danger" class="sx-fc-node-g sx-fc-class-danger" transform="translate(24 632)"><rect x="0" y="0" width="148" height="44" rx="14" ry="14" class="sx-fc-node"/>
<text x="74" y="22" class="sx-fc-node-text" text-anchor="middle" dominant-baseline="central">Active Subscriber</text>
<title>Active Subscriber</title></g></g></g></svg>