<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="schematex-diagram schematex-phylo" viewBox="0 0 499.6 290" width="499.6" height="290"><title>Phylogenetic Tree: Bacterial Diversity</title>
<desc>Phylogenetic tree with 10 taxa, phylogram mode, rectangular layout</desc>
<style>.schematex-phylo {
  --schematex-bg: #ffffff;
  --schematex-text: #2c3e50;
  --schematex-text-muted: #607d8b;
  --schematex-stroke: #37474f;
  --schematex-stroke-muted: #90a4ae;
  --schematex-fill: #ffffff;
  --schematex-fill-muted: #f5f7fa;
  --schematex-accent: #1565c0;
  --schematex-positive: #388e3c;
  --schematex-negative: #d32f2f;
  --schematex-neutral: #9e9e9e;
  --schematex-warn: #e65100;
  --schematex-font-title: 16px;
  --schematex-font-label: 12px;
  --schematex-font-secondary: 11px;
  --schematex-font-small: 9px;
  --schematex-stroke-normal: 1.5;
  --schematex-stroke-medium: 2;
  --schematex-stroke-thick: 2.5;
  font-family: system-ui, -apple-system, sans-serif;
  background: #ffffff;
}
.schematex-phylo-branch { fill: none; stroke: #2c3e50; stroke-width: 1.5; stroke-linecap: round; }
.schematex-phylo-branch-connector { fill: none; stroke: #2c3e50; stroke-width: 1.5; }
.schematex-phylo-tip-label { font-size: 12px; fill: #2c3e50; dominant-baseline: central; }
.schematex-phylo-tip-label-italic { font-style: italic; }
.schematex-phylo-support-label { font-size: 9px; fill: #607d8b; text-anchor: middle; dominant-baseline: auto; }
.schematex-phylo-support-dot { stroke: none; }
.schematex-phylo-scale-bar line { stroke: #2c3e50; stroke-width: 1.5; }
.schematex-phylo-scale-bar text { font-size: 10px; fill: #2c3e50; text-anchor: middle; }
.schematex-phylo-scale-tick { stroke: #2c3e50; stroke-width: 1; }
.schematex-phylo-title { font-size: 16px; font-weight: bold; fill: #2c3e50; text-anchor: middle; }
.schematex-phylo-clade-label { font-size: 13px; font-weight: bold; }
.schematex-phylo-root-marker { fill: none; stroke: #2c3e50; stroke-width: 1.5; }
.schematex-phylo-clade-Gamma { stroke: #1E88E5; }
.schematex-phylo-clade-bg-Gamma { fill: #1E88E5; fill-opacity: 0.12; }
.schematex-phylo-clade-label-Gamma { fill: #1E88E5; }
.schematex-phylo-clade-Firmi { stroke: #E53935; }
.schematex-phylo-clade-bg-Firmi { fill: #E53935; fill-opacity: 0.12; }
.schematex-phylo-clade-label-Firmi { fill: #E53935; }
.schematex-phylo-clade-Actino { stroke: #43A047; }
.schematex-phylo-clade-bg-Actino { fill: #43A047; fill-opacity: 0.12; }
.schematex-phylo-clade-label-Actino { fill: #43A047; }</style>
