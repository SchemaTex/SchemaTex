<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="schematex-diagram schematex-sociogram" viewBox="0 0 400 430" width="400" height="430"><title>Sociogram: Playground Dynamics</title>
<desc>Sociogram with 8 members and 10 connections</desc>
<style>.schematex-sociogram {
  --schematex-bg: #ffffff;
  --schematex-text: #2c3e50;
  --schematex-text-muted: #607d8b;
  --schematex-stroke: #37474f;
  --schematex-stroke-muted: #90a4ae;
  --schematex-fill: #ffffff;
  --schematex-fill-muted: #f5f7fa;
  --schematex-accent: #1565c0;
  --schematex-positive: #388e3c;
  --schematex-negative: #d32f2f;
  --schematex-neutral: #9e9e9e;
  --schematex-warn: #e65100;
  --schematex-font-title: 16px;
  --schematex-font-label: 12px;
  --schematex-font-secondary: 11px;
  --schematex-font-small: 9px;
  --schematex-stroke-normal: 1.5;
  --schematex-stroke-medium: 2;
  --schematex-stroke-thick: 2.5;
  font-family: system-ui, -apple-system, sans-serif;
  background: #ffffff;
}
.schematex-sociogram-node { fill: #1565c0; stroke: #1565c0; stroke-width: 2; }
.schematex-sociogram-node-star { fill: #e65100; stroke: #e65100; stroke-width: 2.5; }
.schematex-sociogram-node-isolate { fill: #f5f7fa; stroke: #9e9e9e; stroke-width: 2; stroke-dasharray: 4 3; }
.schematex-sociogram-node-neglectee { fill: #f5f7fa; stroke: #1565c0; stroke-width: 2; stroke-dasharray: 4 3; }
.schematex-sociogram-node-rejected { fill: #d32f2f; stroke: #d32f2f; stroke-width: 2; stroke-dasharray: 4 3; }
.schematex-sociogram-edge { stroke-linecap: round; }
.schematex-sociogram-edge-positive { stroke: #388e3c; }
.schematex-sociogram-edge-negative { stroke: #d32f2f; stroke-dasharray: 6 3; }
.schematex-sociogram-edge-neutral { stroke: #9e9e9e; stroke-dasharray: 2 3; }
.schematex-sociogram-label { font-size: 11px; fill: #2c3e50; text-anchor: middle; }
.schematex-sociogram-edge-label { font-size: 9px; fill: #607d8b; text-anchor: middle; }
.schematex-sociogram-title { font-size: 16px; font-weight: bold; fill: #2c3e50; text-anchor: middle; }
.schematex-sociogram-star-badge { font-size: 10px; fill: #e65100; }
.schematex-sociogram-group-label { font-size: 13px; font-weight: bold; fill-opacity: 0.7; text-anchor: middle; }
.schematex-sociogram-group-boys { fill: #42A5F5; stroke: #42A5F5; }
.schematex-sociogram-group-girls { fill: #EF5350; stroke: #EF5350; }</style>
