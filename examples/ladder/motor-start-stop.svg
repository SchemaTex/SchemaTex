<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="lt-ladder" role="img" aria-labelledby="lt-ladder-title lt-ladder-desc" width="412.94999999999993" height="343" viewBox="0 0 412.94999999999993 343"><title>Motor Start/Stop</title>
<desc>PLC ladder logic diagram with 1 rung</desc>
<style>.lt-ladder { background: #ffffff; font-family: system-ui, -apple-system, sans-serif; }
.lt-ladder-rail { stroke: #111111; stroke-width: 4; stroke-linecap: square; }
.lt-ladder-wire { stroke: #222222; stroke-width: 1.5; fill: none; }
.lt-ladder-element { stroke: #222222; stroke-width: 2; fill: none; }
.lt-ladder-coil { stroke: #222222; stroke-width: 2; fill: none; }
.lt-ladder-fb { fill: #ffffff; stroke: #222222; stroke-width: 2; }
.lt-ladder-fb-name { font: bold 11px sans-serif; fill: #111111; text-anchor: middle; }
.lt-ladder-pin { font: 8px sans-serif; fill: #222222; }
.lt-ladder-name { font: 9px sans-serif; fill: #111111; text-anchor: middle; }
.lt-ladder-tag { font: 600 9px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1d4e89; text-anchor: middle; }
.lt-ladder-addr { font: 600 8.5px ui-monospace, monospace; fill: #cc0000; text-anchor: middle; }
.lt-ladder-rung-num { font: 10px sans-serif; fill: #555555; text-anchor: end; }
.lt-ladder-comment { font: italic 10px sans-serif; fill: #555555; }
.lt-ladder-title { font: bold 15px sans-serif; fill: #111111; }
.lt-ladder-symbol-label { font: bold 10px sans-serif; fill: #222222; text-anchor: middle; }</style>
<text x="60" y="20" class="lt-ladder-title">Motor Start/Stop</text>
